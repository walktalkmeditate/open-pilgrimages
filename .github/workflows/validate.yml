name: Validate

on:
  push:
    branches: [main]
    paths:
      - 'routes/**'
      - 'schema/**'
      - 'index.json'
      - 'scripts/**'
  pull_request:
    paths:
      - 'routes/**'
      - 'schema/**'
      - 'index.json'
      - 'scripts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate
